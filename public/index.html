<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent - Virtual Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 0.9rem;
        }

        .status-orb {
            width: 120px;
            height: 120px;
            margin: 0 auto 40px;
            border-radius: 50%;
            background: var(--primary);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
            transition: all 0.5s ease;
        }

        .status-orb::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .status-orb.listening {
            background: var(--success);
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.5);
        }

        .status-orb.listening::after {
            border-color: var(--success);
        }

        .status-orb.speaking {
            background: #a855f7;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
        }

        .status-orb.speaking::after {
            border-color: #a855f7;
            animation: pulse 1s infinite;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        button {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        #transcript, #agent-text {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 0.9rem;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            line-height: 1.5;
        }

        #agent-text {
            border-left: 3px solid var(--primary);
            text-align: left;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-top: 20px;
            margin-bottom: 4px;
        }

        .active-text {
            color: var(--text);
        }

        .mic-icon {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .hidden { display: none; }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 16px;
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }

        .status-badge.active {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .booking-saved {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Voice Assistant</h1>
        <p class="subtitle">AI-Powered Service Booking Agent</p>
        
        <div id="status-badge" class="status-badge">Ready</div>

        <div id="orb" class="status-orb">
            <svg class="mic-icon" viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </div>

        <div class="controls">
            <button id="start-btn" class="btn-primary">Start Conversation</button>
            <button id="end-btn" class="btn-danger hidden">End Call</button>
        </div>

        <div class="label hidden" id="agent-label">Agent</div>
        <div id="agent-text" class="hidden"></div>

        <div class="label hidden" id="user-label">You</div>
        <div id="transcript" class="hidden"></div>

        <div id="booking-result" class="booking-saved hidden"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // DOM elements
        const orb = document.getElementById('orb');
        const startBtn = document.getElementById('start-btn');
        const endBtn = document.getElementById('end-btn');
        const agentText = document.getElementById('agent-text');
        const agentLabel = document.getElementById('agent-label');
        const transcript = document.getElementById('transcript');
        const userLabel = document.getElementById('user-label');
        const statusBadge = document.getElementById('status-badge');
        const bookingResult = document.getElementById('booking-result');

        let audioContext = null;
        let mediaStream = null;
        let workletNode = null;
        let isSessionActive = false;

        // ─── Audio Playback ───
        let playbackQueue = [];
        let isPlaying = false;
        const SAMPLE_RATE = 24000;

        function setOrbState(state) {
            orb.classList.remove('listening', 'speaking');
            if (state) orb.classList.add(state);
        }

        function setStatus(text, active = false) {
            statusBadge.textContent = text;
            statusBadge.classList.toggle('active', active);
        }

        function queueAudioChunk(base64) {
            // Decode base64 to PCM16 to Float32
            const raw = atob(base64);
            const bytes = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
            const pcm16 = new Int16Array(bytes.buffer);
            const float32 = new Float32Array(pcm16.length);
            for (let i = 0; i < pcm16.length; i++) float32[i] = pcm16[i] / 32768;

            playbackQueue.push(float32);
            if (!isPlaying) playNextChunk();
        }

        function playNextChunk() {
            if (playbackQueue.length === 0 || !audioContext) {
                isPlaying = false;
                setOrbState('listening');
                setStatus('Listening...', true);
                return;
            }

            isPlaying = true;
            setOrbState('speaking');
            setStatus('Agent speaking...', true);

            const samples = playbackQueue.shift();
            const buffer = audioContext.createBuffer(1, samples.length, SAMPLE_RATE);
            buffer.copyToChannel(samples, 0);

            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.onended = () => playNextChunk();
            source.start();
        }

        function stopPlayback() {
            playbackQueue = [];
            isPlaying = false;
        }

        // ─── Microphone Capture (AudioWorklet for PCM16 @ 24kHz) ───
        async function startMicrophone() {
            audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });

            // Register inline AudioWorklet processor
            const processorCode = `
                class PCMProcessor extends AudioWorkletProcessor {
                    process(inputs) {
                        const input = inputs[0];
                        if (input && input[0]) {
                            const float32 = input[0];
                            const pcm16 = new Int16Array(float32.length);
                            for (let i = 0; i < float32.length; i++) {
                                const s = Math.max(-1, Math.min(1, float32[i]));
                                pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                            }
                            this.port.postMessage(pcm16.buffer, [pcm16.buffer]);
                        }
                        return true;
                    }
                }
                registerProcessor('pcm-processor', PCMProcessor);
            `;
            const blob = new Blob([processorCode], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            await audioContext.audioWorklet.addModule(url);
            URL.revokeObjectURL(url);

            mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    sampleRate: SAMPLE_RATE,
                    channelCount: 1,
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                }
            });

            const source = audioContext.createMediaStreamSource(mediaStream);
            workletNode = new AudioWorkletNode(audioContext, 'pcm-processor');

            workletNode.port.onmessage = (e) => {
                if (!isSessionActive) return;

                // Convert ArrayBuffer to base64
                const pcm16 = new Uint8Array(e.data);
                let binary = '';
                for (let i = 0; i < pcm16.length; i++) {
                    binary += String.fromCharCode(pcm16[i]);
                }
                const base64 = btoa(binary);
                socket.emit('audio-chunk', { audio: base64 });
            };

            source.connect(workletNode);
            workletNode.connect(audioContext.destination); // Required for worklet to run
        }

        function stopMicrophone() {
            if (workletNode) {
                workletNode.disconnect();
                workletNode = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
        }

        // ─── Socket.IO Events ───
        socket.on('connect', () => {
            console.log('Connected to server');
        });

        socket.on('session-started', (data) => {
            console.log('Session started:', data.sessionId);
            setStatus('Connected — Listening...', true);
            setOrbState('listening');
        });

        socket.on('audio-delta', (data) => {
            queueAudioChunk(data.delta);
        });

        let currentAgentText = '';
        socket.on('transcript-delta', (data) => {
            agentLabel.classList.remove('hidden');
            agentText.classList.remove('hidden');
            currentAgentText += data.delta;
            agentText.innerHTML = `<span class="active-text">${currentAgentText}</span>`;
        });

        socket.on('transcript-done', (data) => {
            currentAgentText = '';
        });

        socket.on('user-transcript', (data) => {
            userLabel.classList.remove('hidden');
            transcript.classList.remove('hidden');
            transcript.innerHTML = `<span class="active-text">${data.transcript}</span>`;
        });

        socket.on('speech-started', () => {
            // User started speaking — interrupt agent audio (barge-in)
            stopPlayback();
            setOrbState('listening');
            setStatus('Listening...', true);
            currentAgentText = '';
        });

        socket.on('booking-saved', (data) => {
            bookingResult.classList.remove('hidden');
            bookingResult.innerHTML = `✅ Booking saved for <strong>${data.name}</strong><br>
                Service: ${data.service_type} | Urgency: ${data.urgency}`;
        });

        socket.on('realtime-error', (data) => {
            console.error('Realtime error:', data.error);
            setStatus('Error: ' + (data.error?.message || 'Unknown'), false);
        });

        socket.on('session-closed', () => {
            endSession();
        });

        // ─── Button Handlers ───
        startBtn.onclick = async () => {
            try {
                startBtn.disabled = true;
                setStatus('Connecting...', false);

                await startMicrophone();
                isSessionActive = true;

                socket.emit('start-session');

                startBtn.classList.add('hidden');
                endBtn.classList.remove('hidden');
            } catch (err) {
                console.error('Failed to start:', err);
                setStatus('Microphone access denied', false);
                startBtn.disabled = false;
            }
        };

        endBtn.onclick = () => {
            socket.emit('end-session');
            endSession();
        };

        function endSession() {
            isSessionActive = false;
            stopPlayback();
            stopMicrophone();

            startBtn.classList.remove('hidden');
            startBtn.disabled = false;
            endBtn.classList.add('hidden');
            
            setOrbState(null);
            setStatus('Call ended', false);
        }
    </script>
</body>
</html>
